name: Server CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/cd.yml"

# Required repository secrets — Settings → Secrets and variables → Actions
#   DEPLOY_SSH_KEY            — PEM private key for the EC2 instance
#   DATABASE_URL              — postgresql+asyncpg://postgres:postgres@db:5432/digitalbalance
#   JWT_SECRET                — random secret for signing JWTs
#   GOOGLE_CLIENT_ID          — Google OAuth web client ID (server-side)
#   GOOGLE_CLIENT_SECRET      — Google OAuth client secret
#   S3_ENDPOINT_URL           — Hetzner object storage endpoint (https://...)
#   S3_BUCKET_NAME            — bucket name
#   S3_ACCESS_KEY             — S3 access key
#   S3_SECRET_KEY             — S3 secret key
#
# Required repository variables (non-secret) — Settings → Secrets and variables → Variables
#   DEPLOY_HOST               — EC2 public hostname or IP
#   DEPLOY_USER               — SSH user (e.g. ubuntu)
#   DOMAIN                    — bond-dev.duckdns.org
#   ACME_EMAIL                — email for Let's Encrypt notifications
#   API_BASE_URL              — https://<DOMAIN>/api
#   CLIENT_BASE_URL           — https://<DOMAIN>
#   S3_REGION                 — eu-central-1
#   EXPO_PUBLIC_GOOGLE_CLIENT_ID     — Google OAuth web client ID (client-side, same value as GOOGLE_CLIENT_ID)
#   EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID — Google OAuth iOS client ID

jobs:
  build-server:
    name: Build & push server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        id: meta
        run: |
          BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "base=$BASE" >> $GITHUB_ENV
          echo "image=$BASE:${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.base }}:${{ github.sha }}
            ${{ env.base }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  build-client:
    name: Build & push client image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        id: meta
        run: |
          BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-client
          echo "base=$BASE" >> $GITHUB_ENV
          echo "image=$BASE:${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.base }}:${{ github.sha }}
            ${{ env.base }}:latest
          build-args: |
            EXPO_PUBLIC_API_URL=https://${{ vars.DOMAIN }}/api
            EXPO_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}
            EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=${{ vars.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    environment:
      name: Production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "server/docker-compose.yml,server/docker-compose.prod.yml"
          target: /opt/app
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DOT_ENV: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            S3_REGION=${{ vars.S3_REGION }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
            CLIENT_BASE_URL=${{ vars.CLIENT_BASE_URL }}
            API_IMAGE=${{ needs.build-server.outputs.image }}
            CLIENT_IMAGE=${{ needs.build-client.outputs.image }}
            DOMAIN=${{ vars.DOMAIN }}
            ACME_EMAIL=${{ vars.ACME_EMAIL }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,DOT_ENV
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            printf '%s\n' "$DOT_ENV" > /opt/app/.env
            cd /opt/app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
