name: Server CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/cd.yml"

# Required repository secrets — configure at: Settings → Secrets and variables → Actions
#   DEPLOY_HOST           — EC2 public hostname or IP
#   DEPLOY_USER           — SSH user (e.g. ubuntu or ec2-user)
#   DEPLOY_SSH_KEY        — PEM private key for the instance
#   DATABASE_URL          — postgresql+asyncpg://... connection string
#   JWT_SECRET            — random secret for signing JWTs
#   GOOGLE_CLIENT_ID      — OAuth client ID
#   GOOGLE_CLIENT_SECRET  — OAuth client secret
#   S3_ENDPOINT_URL       — Hetzner object storage endpoint (https://...)
#   S3_BUCKET_NAME        — bucket name
#   S3_ACCESS_KEY         — S3 access key
#   S3_SECRET_KEY         — S3 secret key
# Required repository variables (non-secret):
#   API_BASE_URL          — public URL of the API (e.g. https://api.example.com)
#   CLIENT_BASE_URL       — public URL of the client app
#   S3_REGION             — e.g. eu-central-1

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: Production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.image }}
          DOT_ENV: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            S3_REGION=${{ vars.S3_REGION }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
            CLIENT_BASE_URL=${{ vars.CLIENT_BASE_URL }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          port: 22
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: API_IMAGE,DOT_ENV
          script: |
            set -e
            mkdir -p /opt/app

            # Write .env from CI secrets
            printf '%s\n' "$DOT_ENV" > /opt/app/.env

            # Write production compose override (uses pre-built image, no source volume)
            cat > /opt/app/docker-compose.prod.yml << 'COMPOSE_EOF'
            services:
              api:
                image: PLACEHOLDER_IMAGE
                volumes: []
            COMPOSE_EOF
            sed -i "s|PLACEHOLDER_IMAGE|$API_IMAGE|g" /opt/app/docker-compose.prod.yml

            cd /opt/app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
