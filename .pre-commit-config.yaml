repos:
  - repo: local
    hooks:
      # Server — ruff lint (with autofix)
      - id: ruff
        name: ruff (server)
        entry: bash -c 'cd server && python3 -m ruff check --fix app/ tests/'
        language: system
        types: [python]
        files: ^server/(app|tests)/
        pass_filenames: false

      # Server — ruff format
      - id: ruff-format
        name: ruff-format (server)
        entry: bash -c 'cd server && python3 -m ruff format app/ tests/'
        language: system
        types: [python]
        files: ^server/(app|tests)/
        pass_filenames: false

      # Server — mypy static type check
      - id: mypy
        name: mypy (server)
        entry: bash -c 'cd server && python3 -m mypy app/'
        language: system
        types: [python]
        files: ^server/app/
        pass_filenames: false

      # Client — TypeScript
      - id: tsc
        name: tsc (client)
        entry: bash -c 'cd client && npx tsc --noEmit'
        language: system
        files: ^client/.*\.(ts|tsx)$
        pass_filenames: false

      # Client — ESLint via expo lint
      - id: expo-lint
        name: expo lint (client)
        entry: bash -c 'cd client && npx expo lint'
        language: system
        files: ^client/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
