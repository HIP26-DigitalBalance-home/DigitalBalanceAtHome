  # ── Search ─────────────────────────────────────────────

  /search:
    get:
      operationId: search
      tags: [Search]
      summary: Search across users, families, and challenges
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query string
        - name: type
          in: query
          schema:
            type: string
            enum: [user, family, challenge, all]
            default: all
          description: Filter results by type
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

# ---------- components ----------

components:

  # ── Parameters ─────────────────────────────────────────

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    FamilyId:
      name: familyId
      in: path
      required: true
      schema:
        type: integer
    ClassroomId:
      name: classroomId
      in: path
      required: true
      schema:
        type: integer
    ChallengeId:
      name: challengeId
      in: path
      required: true
      schema:
        type: integer
    PhotoId:
      name: photoId
      in: path
      required: true
      schema:
        type: integer
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: integer
    PageLimit:
      name: pageLimit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    BodyLimit:
      name: bodyLimit
      in: query
      schema:
        type: integer
        minimum: 10
        maximum: 20

  # ── Responses ──────────────────────────────────────────

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ── Schemas ────────────────────────────────────────────

  schemas:

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          examples: ["Resource not found"]

    # ── User ──

    UserRole:
      type: string
      enum: [parent, child, teacher_admin]
      description: "Role of the user: parent, child, or teacher/admin"

    UserCreate:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          examples: ["Max Mustermann"]
        role:
          $ref: "#/components/schemas/UserRole"
        profilePicture:
          type: string
          format: uri
          description: URL to the user's profile picture

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        profilePicture:
          type: string
          format: uri

    User:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
          examples: [4]
        name:
          type: string
          examples: ["Max Mustermann"]
        role:
          $ref: "#/components/schemas/UserRole"
        profilePicture:
          type: string
          format: uri
          nullable: true

    # ── Family ──

    FamilyCreate:
      type: object
      required: [parentIds, childIds]
      properties:
        parentIds:
          type: array
          items:
            type: integer
          minItems: 1
          maxItems: 2
          description: User IDs of the parents (1 or 2)
        childIds:
          type: array
          items:
            type: integer
          minItems: 1
          description: User IDs of the children (at least 1)

    Family:
      type: object
      required: [id, parents, children, totalPoints]
      properties:
        id:
          type: integer
          examples: [1]
        parents:
          type: array
          items:
            $ref: "#/components/schemas/User"
          minItems: 1
          maxItems: 2
        children:
          type: array
          items:
            $ref: "#/components/schemas/User"
          minItems: 1
        displayName:
          type: string
          description: Auto-generated display name, e.g. "Sarah & Emma"
          examples: ["Sarah & Emma"]
        totalPoints:
          type: integer
          examples: [340]
        photoCount:
          type: integer
          examples: [15]
        challengeCount:
          type: integer
          examples: [5]
        rank:
          type: integer
          nullable: true
          examples: [4]
        level:
          type: integer
          examples: [12]

    # ── Classroom ──

    ClassroomCreate:
      type: object
      required: [name, teacherId]
      properties:
        name:
          type: string
          examples: ["Grade 3A"]
        teacherId:
          type: integer
          description: User ID of the teacher who manages this classroom

    Classroom:
      type: object
      required: [id, name, teacher, feedEnabled]
      properties:
        id:
          type: integer
          examples: [1]
        name:
          type: string
          examples: ["Grade 3A"]
        teacher:
          $ref: "#/components/schemas/User"
        feedEnabled:
          type: boolean
          default: true
        familyIds:
          type: array
          items:
            type: integer
          description: IDs of families in this classroom

    # ── Challenge ──

    ChallengeCreate:
      type: object
      required: [title, icon, activities]
      properties:
        title:
          type: string
          examples: ["Cooking Challenge"]
        icon:
          type: string
          description: Emoji icon for the challenge
          examples: ["🍳"]
        description:
          type: string
          examples: ["Kitchen fun with the family"]
        activities:
          type: array
          items:
            type: string
          minItems: 9
          maxItems: 9
          description: Exactly 9 activity titles for the 3x3 bingo grid

    ChallengeSummary:
      type: object
      required: [id, title, icon]
      properties:
        id:
          type: integer
          examples: [1]
        title:
          type: string
          examples: ["Cooking Challenge"]
        icon:
          type: string
          examples: ["🍳"]
        description:
          type: string
          examples: ["Kitchen fun with the family"]

    Challenge:
      allOf:
        - $ref: "#/components/schemas/ChallengeSummary"
        - type: object
          required: [activities]
          properties:
            activities:
              type: array
              items:
                type: string
              minItems: 9
              maxItems: 9
              description: The 9 activity titles in bingo grid order

    FeaturedChallenge:
      allOf:
        - $ref: "#/components/schemas/Challenge"
        - type: object
          required: [endsAt]
          properties:
            endsAt:
              type: string
              format: date-time
              description: When the featured period ends

    # ── Challenge Progress ──

    CompletedCell:
      type: object
      required: [activityIndex, photoId, completedAt]
      properties:
        activityIndex:
          type: integer
          minimum: 0
          maximum: 8
        photoId:
          type: integer
        photoUrl:
          type: string
          format: uri
        completedAt:
          type: string
          format: date-time

    ChallengeProgress:
      type: object
      required: [familyId, challengeId, status, completedCells, pointsEarned]
      properties:
        familyId:
          type: integer
        challengeId:
          type: integer
        challenge:
          $ref: "#/components/schemas/ChallengeSummary"
        status:
          type: string
          enum: [ongoing, completed]
        completedCells:
          type: array
          items:
            $ref: "#/components/schemas/CompletedCell"
        completedCount:
          type: integer
          minimum: 0
          maximum: 9
          examples: [6]
        pointsEarned:
          type: integer
          examples: [120]
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when all 9 cells are completed
        joinedAt:
          type: string
          format: date-time

    # ── Photo ──

    Photo:
      type: object
      required: [id, familyId, uploadedAt]
      properties:
        id:
          type: integer
        familyId:
          type: integer
        challengeId:
          type: integer
          nullable: true
        activityIndex:
          type: integer
          nullable: true
          minimum: 0
          maximum: 8
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time

    # ── Feed ──

    FeedEntry:
      type: object
      required: [id, family, challenge, activity, photoUrl, pointsAwarded, createdAt]
      properties:
        id:
          type: integer
        family:
          type: object
          properties:
            id:
              type: integer
            displayName:
              type: string
              examples: ["Sarah & Emma"]
            profileImage:
              type: string
              format: uri
        challenge:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
              examples: ["Cooking Challenge"]
        activity:
          type: string
          examples: ["Bake cookies together"]
        photoUrl:
          type: string
          format: uri
        pointsAwarded:
          type: integer
          examples: [20]
        createdAt:
          type: string
          format: date-time

    # ── Leaderboard ──

    LeaderboardEntry:
      type: object
      required: [rank, family, points]
      properties:
        rank:
          type: integer
          examples: [1]
        family:
          type: object
          properties:
            id:
              type: integer
            displayName:
              type: string
              examples: ["Sarah & Emma"]
            profileImage:
              type: string
              format: uri
        points:
          type: integer
          examples: [340]

    # ── Messages ──

    Conversation:
      type: object
      required: [id, participants]
      properties:
        id:
          type: integer
        participants:
          type: array
          items:
            type: object
            properties:
              familyId:
                type: integer
              displayName:
                type: string
              profileImage:
                type: string
                format: uri
              online:
                type: boolean
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
          examples: [3]

    MessageCreate:
      type: object
      required: [senderFamilyId]
      properties:
        senderFamilyId:
          type: integer
        text:
          type: string
          description: Text content (required if no media is attached)
        mediaType:
          type: string
          enum: [video, audio]
          description: Type of media attachment (if any)
        mediaUrl:
          type: string
          format: uri
          description: URL of the media attachment

    Message:
      type: object
      required: [id, conversationId, senderFamilyId, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderFamilyId:
          type: integer
        senderDisplayName:
          type: string
          examples: ["Sarah & Emma"]
        text:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [video, audio]
          nullable: true
        mediaUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Search ──

    SearchResults:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        families:
          type: array
          items:
            $ref: "#/components/schemas/Family"
        challenges:
          type: array
          items:
            $ref: "#/components/schemas/ChallengeSummary"
