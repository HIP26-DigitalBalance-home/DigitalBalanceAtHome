openapi: 3.1.0
info:
  title: DigitalBalanceAtHome
  description:  API for DigitalBalanceAtHome Project - encouraging screen-free family activities through photo bingo challenges.
  version: 0.0.1
  contact:
    name: Viktoria Kabaivanova
    email: viktoria.kabaivanova@tum.de

servers:
  - url: http://localhost:8000
    description: during development

tags:
  - name: Users
    description: User registration and profile management (Parent, Child, Teacher/Admin)
  - name: Families
    description: Family units composed of parents and children
  - name: Classrooms
    description: Classrooms (feeds) managed by teachers, grouping families
  - name: Challenges
    description: Bingo-style photo challenges with 9 activities each
  - name: Challenge Progress
    description: Family progress on joined challenges
  - name: Photos
    description: Photo upload and retrieval for challenge activities
  - name: Feed
    description: Activity feed showing recent completions within a classroom
  - name: Leaderboard
    description: Family rankings by points
  - name: Messages
    description: Conversations between families
  - name: Search
    description: Search across users and challenges

# ---------- paths ----------

paths:

  # ── Users ──────────────────────────────────────────────

  /users:
    get:
      operationId: getUsers
      tags: [Users]
      summary: List all users
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/BodyLimit"
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      operationId: getUser
      tags: [Users]
      summary: Get a user by ID
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateUser
      tags: [Users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags: [Users]
      summary: Delete a user
      responses:
        "204":
          description: User deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Families ───────────────────────────────────────────

  /families:
    get:
      operationId: getFamilies
      tags: [Families]
      summary: List all families
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: A list of families
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Family"
    post:
      operationId: createFamily
      tags: [Families]
      summary: Create a new family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyCreate"
      responses:
        "201":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "400":
          $ref: "#/components/responses/BadRequest"

  /families/{familyId}:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
    get:
      operationId: getFamily
      tags: [Families]
      summary: Get a family by ID
      responses:
        "200":
          description: Family details including members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateFamily
      tags: [Families]
      summary: Update a family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyCreate"
      responses:
        "200":
          description: Family updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFamily
      tags: [Families]
      summary: Delete a family
      responses:
        "204":
          description: Family deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/members:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
    post:
      operationId: addFamilyMember
      tags: [Families]
      summary: Add a member (parent or child) to a family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: integer
                  examples: [7]
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "400":
          description: Family already has the maximum number of parents (2) or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
      - $ref: "#/components/parameters/UserId"
    delete:
      operationId: removeFamilyMember
      tags: [Families]
      summary: Remove a member from a family
      responses:
        "204":
          description: Member removed
        "400":
          description: Cannot remove the last parent from a family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/streak:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
    get:
      operationId: getFamilyStreak
      tags: [Families]
      summary: Get the current activity streak for a family
      responses:
        "200":
          description: Streak information
          content:
            application/json:
              schema:
                type: object
                properties:
                  familyId:
                    type: integer
                  currentStreak:
                    type: integer
                    description: Consecutive days with at least one completed activity
                    examples: [5]
                  longestStreak:
                    type: integer
                    examples: [12]
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Classrooms ─────────────────────────────────────────

  /classrooms:
    get:
      operationId: getClassrooms
      tags: [Classrooms]
      summary: List all classrooms
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: A list of classrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classroom"
    post:
      operationId: createClassroom
      tags: [Classrooms]
      summary: Create a new classroom (teacher/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomCreate"
      responses:
        "201":
          description: Classroom created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "400":
          $ref: "#/components/responses/BadRequest"

  /classrooms/{classroomId}:
    parameters:
      - $ref: "#/components/parameters/ClassroomId"
    get:
      operationId: getClassroom
      tags: [Classrooms]
      summary: Get a classroom by ID
      responses:
        "200":
          description: Classroom details including families
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateClassroom
      tags: [Classrooms]
      summary: Update a classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomCreate"
      responses:
        "200":
          description: Classroom updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteClassroom
      tags: [Classrooms]
      summary: Delete a classroom
      responses:
        "204":
          description: Classroom deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /classrooms/{classroomId}/families:
    parameters:
      - $ref: "#/components/parameters/ClassroomId"
    post:
      operationId: addFamilyToClassroom
      tags: [Classrooms]
      summary: Add a family to a classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [familyId]
              properties:
                familyId:
                  type: integer
                  examples: [3]
      responses:
        "200":
          description: Family added to classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          $ref: "#/components/responses/NotFound"

  /classrooms/{classroomId}/families/{familyId}:
    parameters:
      - $ref: "#/components/parameters/ClassroomId"
      - $ref: "#/components/parameters/FamilyId"
    delete:
      operationId: removeFamilyFromClassroom
      tags: [Classrooms]
      summary: Remove a family from a classroom
      responses:
        "204":
          description: Family removed from classroom
        "404":
          $ref: "#/components/responses/NotFound"

  /classrooms/{classroomId}/feed-toggle:
    parameters:
      - $ref: "#/components/parameters/ClassroomId"
    put:
      operationId: toggleClassroomFeed
      tags: [Classrooms]
      summary: Toggle the activity feed on or off for a classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feedEnabled]
              properties:
                feedEnabled:
                  type: boolean
      responses:
        "200":
          description: Feed toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Challenges ─────────────────────────────────────────

  /challenges:
    get:
      operationId: getChallenges
      tags: [Challenges]
      summary: List all available challenges
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: A list of challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChallengeSummary"
    post:
      operationId: createChallenge
      tags: [Challenges]
      summary: Create a new challenge (teacher/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeCreate"
      responses:
        "201":
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
        "400":
          $ref: "#/components/responses/BadRequest"

  /challenges/featured:
    get:
      operationId: getFeaturedChallenge
      tags: [Challenges]
      summary: Get the current "Game of the Week" featured challenge
      responses:
        "200":
          description: Featured challenge with time remaining
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedChallenge"
        "404":
          description: No featured challenge is currently active

  /challenges/{challengeId}:
    parameters:
      - $ref: "#/components/parameters/ChallengeId"
    get:
      operationId: getChallenge
      tags: [Challenges]
      summary: Get a challenge with its 9 activities
      responses:
        "200":
          description: Full challenge details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateChallenge
      tags: [Challenges]
      summary: Update a challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeCreate"
      responses:
        "200":
          description: Challenge updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteChallenge
      tags: [Challenges]
      summary: Delete a challenge
      responses:
        "204":
          description: Challenge deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /challenges/{challengeId}/related:
    parameters:
      - $ref: "#/components/parameters/ChallengeId"
    get:
      operationId: getRelatedChallenges
      tags: [Challenges]
      summary: Get challenges related to the given one
      responses:
        "200":
          description: A list of related challenge summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChallengeSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Challenge Progress ─────────────────────────────────

  /families/{familyId}/challenges:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
    get:
      operationId: getFamilyChallenges
      tags: [Challenge Progress]
      summary: Get all challenges a family has joined (ongoing and completed)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ongoing, completed, all]
            default: all
      responses:
        "200":
          description: Family's challenge dashboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChallengeProgress"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/challenges/{challengeId}:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
      - $ref: "#/components/parameters/ChallengeId"
    get:
      operationId: getFamilyChallengeProgress
      tags: [Challenge Progress]
      summary: Get a family's progress on a specific challenge
      responses:
        "200":
          description: Detailed progress with completed cells and photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeProgress"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/challenges/{challengeId}/join:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
      - $ref: "#/components/parameters/ChallengeId"
    post:
      operationId: joinChallenge
      tags: [Challenge Progress]
      summary: Join a challenge as a family
      responses:
        "201":
          description: Challenge joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeProgress"
        "409":
          description: Family has already joined this challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/challenges/{challengeId}/activities/{activityIndex}:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
      - $ref: "#/components/parameters/ChallengeId"
      - name: activityIndex
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
          maximum: 8
        description: Index of the activity in the 3x3 bingo grid (0-8)
    post:
      operationId: completeActivity
      tags: [Challenge Progress]
      summary: Complete a bingo cell by uploading a photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: The photo proving the activity was completed
      responses:
        "200":
          description: Activity completed, points awarded
          content:
            application/json:
              schema:
                type: object
                properties:
                  activityIndex:
                    type: integer
                  photoId:
                    type: integer
                  pointsAwarded:
                    type: integer
                    examples: [20]
                  progress:
                    $ref: "#/components/schemas/ChallengeProgress"
        "400":
          description: Activity already completed or invalid photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/challenges/{challengeId}/export:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
      - $ref: "#/components/parameters/ChallengeId"
    get:
      operationId: exportChallenge
      tags: [Challenge Progress]
      summary: Export a completed challenge as a photo collage
      responses:
        "200":
          description: The exported collage image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Challenge is not yet fully completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Photos ─────────────────────────────────────────────

  /photos:
    post:
      operationId: uploadPhoto
      tags: [Photos]
      summary: Upload a photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "400":
          $ref: "#/components/responses/BadRequest"

  /photos/{photoId}:
    parameters:
      - $ref: "#/components/parameters/PhotoId"
    get:
      operationId: getPhoto
      tags: [Photos]
      summary: Get photo metadata
      responses:
        "200":
          description: Photo metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePhoto
      tags: [Photos]
      summary: Delete a photo
      responses:
        "204":
          description: Photo deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /photos/{photoId}/image:
    parameters:
      - $ref: "#/components/parameters/PhotoId"
    get:
      operationId: getPhotoImage
      tags: [Photos]
      summary: Get the actual photo file
      responses:
        "200":
          description: The photo file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /families/{familyId}/photos:
    parameters:
      - $ref: "#/components/parameters/FamilyId"
    get:
      operationId: getFamilyPhotos
      tags: [Photos]
      summary: Get all photos uploaded by a family
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Feed ───────────────────────────────────────────────

  /classrooms/{classroomId}/feed:
    parameters:
      - $ref: "#/components/parameters/ClassroomId"
    get:
      operationId: getClassroomFeed
      tags: [Feed]
      summary: Get the activity feed for a classroom
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Activity feed entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /challenges/{challengeId}/completions:
    parameters:
      - $ref: "#/components/parameters/ChallengeId"
    get:
      operationId: getChallengeCompletions
      tags: [Feed]
      summary: Get recent completions across all families for a specific challenge
      parameters:
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Recent community completions for this challenge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedEntry"
        "404":
          $ref: "#/components/responses/NotFound"

